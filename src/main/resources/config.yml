# ==========================================================
# NexusRevive - Configuracion principal
# ==========================================================
# Este archivo controla el comportamiento general del plugin:
# abatido, revive, cargar jugadores, sonidos y compatibilidad.
#
# Recomendacion:
# 1. Cambia una sola seccion por vez.
# 2. Guarda el archivo.
# 3. Usa /nr reload para aplicar cambios simples.
# ==========================================================

mechanics:
  # Vida que tendra el jugador una vez entre en estado abatido.
  # 1.0 = medio corazon, 2.0 = un corazon, etc.
  downed-health: 1.0

  # Velocidad de movimiento del jugador abatido.
  # 0.2 es la velocidad vanilla normal del jugador.
  downed-walk-speed: 0.06

  # Tiempo total en segundos antes de que el abatido muera definitivamente.
  death-delay-seconds: 75

  # Segundos en los que el abatido no puede ser rematado despues de caer.
  invulnerability-seconds: 15

  # Vida que tendra el jugador al ser revivido.
  revived-health: 6.0

  # Delay en ticks antes de aplicar la pose de abatido.
  # 20 ticks = 1 segundo.
  # Sirve para que se vea el impacto antes de caer al suelo.
  downed-entry-delay-ticks: 4

  # Knockback horizontal al entrar en estado abatido.
  # Subelo si quieres una caida mas dramatica.
  downed-entry-knockback-horizontal: 0.16

  # Empuje vertical al entrar en estado abatido.
  # Valores bajos hacen una caida mas natural.
  downed-entry-knockback-vertical: 0.08

  # Que hacer cuando se termina el contador del abatido:
  # KILL   = muere definitivamente
  # REVIVE = se levanta automaticamente
  death-action: KILL

  # Si el jugador se desconecta mientras esta abatido:
  # true  = muere/limpia su estado
  # false = conserva el estado abatido al reconectar
  kill-on-disconnect: true

  # Si al morir definitivamente estando abatido se oculta el death message.
  disable-death-message-while-downed: true

revive:
  # Tiempo en segundos que tarda el revive completo.
  duration-seconds: 10

  # Si el reviver debe mantener shift para seguir reviviendo.
  require-sneak: true

  # Permite que un jugador abatido se reviva a si mismo.
  allow-self-revive: false

  # Distancia maxima para iniciar el revive.
  start-distance: 2.0

  # Si el reviver se aleja mas de esta distancia, el revive se cancela.
  cancel-distance: 4.5

  # Donde se puede revivir:
  # ANYWHERE      = en cualquier sitio
  # ONLY_IN_ZONES = solo dentro de zonas creadas con /nr zone
  zone-mode: ANYWHERE

  # Si las zonas de revive modifican la velocidad del revive.
  # true  = el multiplicador de la zona afecta el tiempo
  # false = todas las zonas reviven a la misma velocidad
  zones-affect-speed: true

  auto-revive-finish-effect:
    # Efecto visual/sonoro que se reproduce al completar un auto-revive en zona.
    enabled: true

    primary-particle:
      enabled: true
      particle: TOTEM_OF_UNDYING
      count: 32
      offset-x: 0.45
      offset-y: 0.70
      offset-z: 0.45
      extra: 0.0

    secondary-particle:
      enabled: true
      particle: HAPPY_VILLAGER
      count: 18
      offset-x: 0.40
      offset-y: 0.60
      offset-z: 0.40
      extra: 0.0

    sound:
      enabled: true
      sound: ITEM_TOTEM_USE
      volume: 0.9
      pitch: 1.15

  required-item:
    # Si hace falta llevar un item valido para poder revivir.
    enabled: false

    # Si al completar el revive se consume 1 item del stack usado.
    consume-on-success: true

    # NexusRevive revisa la main hand y la offhand.
    # Si cualquiera coincide con una regla, permite el revive.
    items:
      revive_kit:
        material: PAPER
        has_custom_model_data: false
        custom_model_data: 0
        name_contains: "&eRevive Kit"

carry:
  # Si los jugadores abatidos pueden cargarse encima.
  enabled: true

  # Si el jugador que carga recibe dano:
  # true  = suelta al abatido
  # false = sigue cargandolo
  drop-on-picker-damage: false

  # Si el contador de muerte se pausa mientras lo estan cargando.
  stop-death-timer-while-carried: false

  # Si el abatido puede bajarse solo del jugador que lo carga.
  allow-downed-dismount: false

loot:
  # Si se permite saquear a jugadores abatidos con shift + click derecho.
  enabled: true

  # Debug temporal del sistema de saqueo.
  # true  = muestra logs detallados en consola al abrir/clickear/cerrar el menu
  # false = oculta esos logs
  debug: false

  # Si el saqueo exige mantener shift al hacer click derecho.
  require-sneak: true

  # Si solo un jugador puede tener abierta la sesion de saqueo por victima.
  # Recomendado: true, para mantener el flujo mas seguro y predecible.
  single-robber-lock: true

  # Si se permite saquear a un abatido mientras alguien lo esta reviviendo.
  allow-while-reviving: false

  # Si se permite saquear a un abatido mientras esta cargado por otro jugador.
  allow-while-carried: false

  # Si se permite saquear el inventario principal y hotbar del abatido.
  allow-main-inventory: true

  # Si se permite saquear las piezas de armadura del abatido.
  allow-armor: true

  # Si se permite saquear la offhand del abatido.
  allow-offhand: true

persistence:
  # Si NexusRevive debe guardar states.yml en disco.
  # true  = conserva abatidos y muertes pendientes entre reinicios
  # false = no carga ni guarda states.yml
  enabled: false

updater:
  # Si NexusRevive debe comprobar actualizaciones al iniciar.
  # La URL del updater esta fija en el codigo y no se puede editar desde aqui.
  enabled: true

sounds:
  # Sonido que se reproduce mientras el revive esta en progreso.
  # cooldown-ticks evita que se repita demasiado seguido.
  # 20 ticks = 1 segundo.
  reliving:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_HARP
    volume: 1.0
    pitch: 1.0
    cooldown-ticks: 20

  # Sonido al empezar a revivir.
  start-reliving:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_HARP
    volume: 1.0
    pitch: 1.0
    cooldown-ticks: 0

  # Sonido al cancelar o interrumpir el revive.
  stop-reliving:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_HARP
    volume: 1.0
    pitch: 1.0
    cooldown-ticks: 0

  # Sonido al completar el revive.
  success-relive:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_HARP
    volume: 1.0
    pitch: 1.0
    cooldown-ticks: 0

downed-effects:
  # Si NexusRevive debe aplicar efectos de pocion mientras el jugador este abatido.
  # Estos efectos se eliminan automaticamente al revivir, morir o salir del estado abatido.
  enabled: true

  # Puedes borrar, editar o anadir entradas.
  # El campo "type" acepta nombres vanilla como:
  # SLOWNESS, WEAKNESS, DARKNESS, BLINDNESS, SLOW_FALLING, etc.
  effects:
    slowness:
      type: SLOWNESS
      amplifier: 6
      ambient: false
      particles: false
      icon: false

    weakness:
      type: WEAKNESS
      amplifier: 1
      ambient: false
      particles: false
      icon: false

    # Ejemplo opcional:
    # darkness:
    #   type: DARKNESS
    #   amplifier: 0
    #   ambient: false
    #   particles: false
    #   icon: false

suicide:
  # Si el abatido puede suicidarse manteniendo shift.
  enabled: true

  # Cuantos segundos debe mantener shift para suicidarse.
  hold-seconds: 5

restrictions:
  worlds:
    # Control por mundos:
    # BLACKLIST = funciona en todos menos en los de la lista
    # WHITELIST = solo funciona en los de la lista
    mode: BLACKLIST

    # Lista de mundos afectados por el modo anterior.
    list:
      - example_world_disabled

  # Causas de dano ignoradas por el sistema de abatido.
  # Ejemplo: si pones VOID, el vacio matara normal.
  ignored-damage-causes:
    - VOID

downed-interactions:
  # Si el abatido puede moverse.
  allow-move: true

  # Si el abatido puede interactuar con bloques en general.
  allow-interact: false

  # Si el abatido puede interactuar con entidades.
  allow-entity-interact: false

  # Si el abatido puede romper bloques.
  allow-block-break: false

  # Si el abatido puede colocar bloques.
  allow-block-place: false

  # Si el abatido puede usar teleports/comandos que teletransporten.
  allow-teleport: false

  # Si el abatido puede disparar o lanzar proyectiles.
  allow-projectiles: false

  # Si el abatido puede comer o beber items consumibles.
  allow-consume: false

  # Si el abatido puede mover items en su inventario principal y hotbar.
  # Este ajuste no controla offhand ni armadura: esos slots tienen su propio toggle abajo.
  allow-inventory: false

  # Si el abatido puede usar o intercambiar el slot de la mano secundaria.
  allow-offhand: false

  # Si el abatido puede cambiar el casco mientras esta abatido.
  allow-helmet: false

  # Si el abatido puede cambiar el peto mientras esta abatido.
  allow-chestplate: false

  # Si el abatido puede cambiar las grebas mientras esta abatido.
  allow-leggings: false

  # Si el abatido puede cambiar las botas mientras esta abatido.
  allow-boots: false

  # Si el abatido puede tirar objetos.
  allow-item-drop: false

  # Si el abatido puede recoger objetos.
  allow-item-pickup: false

  # Si el abatido puede usar elytra.
  allow-gliding: false

  # Si el abatido puede recibir dano por caida.
  allow-fall-damage: false

  # Distancia maxima de caida para permitir estado abatido.
  # -1 = sin limite
  # Si cae mas que este valor, no entra en abatido.
  max-fall-distance: -1

commands:
  # Control de comandos mientras el jugador esta abatido.
  # BLACKLIST = bloquea solo los comandos listados
  # WHITELIST = permite solo los comandos listados
  #
  # /nr y /nexusrevive siempre siguen permitidos aparte.
  mode: BLACKLIST
  list: []

hooks:
  vault:
    # Hook con Vault para cobrar por el revive.
    # Solo funciona si Vault y una economia estan instalados.
    enabled: true

    # Coste del revive.
    # 0.0 = gratis
    revive-cost: 0.0

  worldguard:
    # Hook con WorldGuard.
    enabled: true

    # NexusRevive registra estas flags de region:
    # nexus-revive
    # nexus-revive-carry
    # nexus-revive-loot
    #
    # nexus-revive:
    # Controla solo la accion de revivir.
    #
    # nexus-revive-carry:
    # Controla solo la accion de cargar abatidos.
    #
    # nexus-revive-loot:
    # Controla solo la accion de saquear abatidos.
    #
    # Si una flag esta en ALLOW, la accion queda permitida ahi.
    # Si una flag esta en DENY, la accion queda bloqueada.
    # Si una flag no esta definida, NexusRevive no bloquea esa accion por WorldGuard.
    #
    # Ejemplo:
    # /rg flag <region> nexus-revive allow
    # /rg flag <region> nexus-revive-carry deny
    # /rg flag <region> nexus-revive-loot deny

  deluxecombat:
    # Hook con DeluxeCombat.
    enabled: true

    # Si se permite revivir mientras alguno de los jugadores esta en combate.
    allow-revive-in-combat: true

    # Si se permite cargar abatidos mientras alguno esta en combate.
    allow-carry-in-combat: false

    # Si se respeta la proteccion PvP de DeluxeCombat al intentar abatir.
    respect-pvp-protection: true

scoreboard:
  # Si se muestra un scoreboard personal del sistema NexusRevive.
  enabled: true

  # Cada cuantos ticks se refresca el contenido.
  # 10 ticks = 0.5 segundos.
  update-interval-ticks: 10

  # Si el abatido debe ver su propio scoreboard de estado.
  show-for-downed: true

  # Si el jugador que esta reviviendo debe ver un scoreboard de progreso.
  show-for-reviver: true

  # Si el jugador que esta cargando a un abatido debe ver un scoreboard de traslado.
  show-for-picker: true

events:
  # Sistema de eventos por comandos.
  # Cada entrada acepta una lista de comandos.
  #
  # Remitentes soportados:
  # [console] = ejecuta como consola
  # [victim]  = ejecuta como el abatido
  # [attacker]= ejecuta como el atacante si existe
  # [reviver] = ejecuta como quien revive
  # [picker]  = ejecuta como quien carga
  #
  # Placeholders disponibles:
  # <victim> <attacker> <reviver> <picker>
  # <world> <x> <y> <z>
  #
  # Ejemplo:
  # - "[console] broadcast &c<victim> ha quedado abatido en <world> (<x>, <y>, <z>)"

  player-downed:
    # Se dispara cuando un jugador entra en estado abatido.
    enabled: false
    commands:
      - "[console] say <victim> ha quedado abatido."

  player-start-revive:
    # Se dispara cuando alguien empieza a revivir a un abatido.
    enabled: false
    commands:
      - "[console] say <reviver> ha empezado a revivir a <victim>."

  player-stop-revive:
    # Se dispara cuando un revive se interrumpe o cancela.
    enabled: false
    commands:
      - "[console] say Se cancelo el revive de <victim>."

  player-revived:
    # Se dispara cuando el revive se completa con exito.
    enabled: false
    commands:
      - "[console] say <victim> ha sido revivido."

  player-picked-up:
    # Se dispara cuando un jugador carga a un abatido.
    enabled: false
    commands:
      - "[console] say <picker> esta cargando a <victim>."

  player-dropped:
    # Se dispara cuando el abatido es soltado al suelo.
    enabled: false
    commands:
      - "[console] say <picker> solto a <victim>."

  player-final-death:
    # Se dispara cuando el abatido muere definitivamente.
    enabled: false
    commands:
      - "[console] say <victim> murio definitivamente."

# ==========================================================
# PlaceholderAPI
# ==========================================================
# Si tienes PlaceholderAPI instalado, NexusRevive registra
# placeholders internos con el identificador:
# %nexusrevive_<placeholder>%
#
# Disponibles:
# %nexusrevive_status%
# %nexusrevive_death_delay%
# %nexusrevive_invulnerability%
# %nexusrevive_reviver%
# %nexusrevive_picker%
# %nexusrevive_attacker%
# %nexusrevive_victim%
# %nexusrevive_progress%
# %nexusrevive_auto_revive_zone%
# %nexusrevive_in_auto_revive_zone%
# %nexusrevive_auto_reviving%
# %nexusrevive_death_delay_bar%
# %nexusrevive_invulnerability_bar%
# %nexusrevive_progress_bar%
#
# Nota:
# Si persistence.enabled esta en true, NexusRevive guarda
# estados temporales en states.yml para soportar
# reconexiones, reinicios y muertes pendientes.
