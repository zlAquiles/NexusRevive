    &b&lZonas de revive
    &8
    &f/nr zone wand &8- &7Te da el hacha de seleccion.
    &f/nr zone create <nombre> &8- &7Crea una zona con la seleccion actual.
    &f/nr zone remove <nombre> &8- &7Elimina una zona.
    &f/nr zone list &8- &7Lista las zonas registradas.
    &f/nr zone speed <nombre> <valor> &8- &7Cambia la velocidad de revive.
  wand-name: "&6Zone Wand"
  wand-lore:
    - "&7Izquierdo en bloque: &fPos 1"
