    format: "&8[<filled><empty>&8]"
    length: 12
    filled: "■"
    empty: "■"
    filled-color: "&c"
    empty-color: "&8"
  invulnerability:
    format: "&8[<filled><empty>&8]"
    length: 8
    filled: "■"
    empty: "■"
    filled-color: "&e"
    empty-color: "&8"
  progress:
    format: "&8[<filled><empty>&8]"
    length: 12
    filled: "■"
    empty: "■"
    filled-color: "&a"
    empty-color: "&8"
  suicide:
    format: "&8[<filled><empty>&8]"
    length: 12
    filled: "■"
    empty: "■"
    filled-color: "&c"
    empty-color: "&8"

