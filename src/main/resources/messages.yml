command:
  help: |-
    &b&lNexusRevive &7comandos disponibles
    &8
    &f/nr reload &8- &7Recarga config, mensajes, gps y zonas.
    &f/nr down <jugador> &8- &7Fuerza el estado abatido.
    &f/nr revive <jugador> &8- &7Revive a un jugador abatido.
    &f/nr kill <jugador> &8- &7Finaliza a un jugador abatido.
    &f/nr gps &8- &7Abre el rastreador de abatidos.
    &f/nr zone wand|create|remove|list|speed &8- &7Gestiona zonas de revive.
